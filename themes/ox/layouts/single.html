{{ define "main" }}
  <section class="asphalt-shell asphalt-shell--single">
    <div class="asphalt-divider" aria-hidden="true"></div>
    <header class="asphalt-block__head asphalt-block__head--page">
      <h1>{{ .Title | upper }}</h1>
      {{ with partial "asphalt-summary.html" . }}<p class="asphalt-page-kicker">{{ . }}</p>{{ end }}
    </header>
    <article class="asphalt-prose asphalt-page-body">{{ .Content }}</article>
  </section>
{{ end }}
